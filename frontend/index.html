<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Decentralized Fact Checker — GenLayer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet" />

<script type="importmap">
{
  "imports": {
    "genlayer-js":        "https://esm.sh/genlayer-js@latest",
    "genlayer-js/chains": "https://esm.sh/genlayer-js@latest/chains",
    "genlayer-js/types":  "https://esm.sh/genlayer-js@latest/types"
  }
}
</script>

<style>
  :root {
    --bg:#080b0f;--surface:#0e1318;--border:#1e2832;
    --accent:#00e5ff;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
    --text:#c9d1d9;--muted:#4a5568;
    --font-mono:'JetBrains Mono',monospace;--font-sans:'Space Grotesk',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-mono);min-height:100vh;padding:40px 20px;
    background-image:radial-gradient(ellipse at 20% 0%,rgba(0,229,255,0.04) 0%,transparent 60%),
                     radial-gradient(ellipse at 80% 100%,rgba(124,58,237,0.05) 0%,transparent 60%);}
  .wrap{max-width:640px;margin:0 auto;}
  .logo{font-size:11px;letter-spacing:0.25em;color:var(--accent);text-transform:uppercase;margin-bottom:12px;opacity:0.8;}
  h1{font-family:var(--font-sans);font-size:clamp(24px,4vw,36px);font-weight:700;color:#fff;line-height:1.15;margin-bottom:10px;}
  h1 span{color:var(--accent);}
  .subtitle{font-size:12px;color:var(--muted);letter-spacing:0.05em;line-height:1.6;margin-bottom:28px;}
  code{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:11px;color:var(--accent);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;margin-bottom:16px;}
  textarea{background:var(--bg);border:1px solid var(--border);border-radius:6px;width:100%;
    color:var(--text);font-family:var(--font-mono);font-size:13px;padding:10px 12px;outline:none;
    transition:border-color 0.2s;resize:vertical;min-height:70px;}
  textarea:focus{border-color:var(--accent);}
  textarea::placeholder{color:var(--muted);}
  button.primary{background:var(--accent);color:#000;border:none;border-radius:6px;font-family:var(--font-mono);
    font-weight:600;font-size:12px;letter-spacing:0.08em;padding:12px 20px;cursor:pointer;text-transform:uppercase;
    width:100%;margin-top:12px;transition:opacity 0.2s,transform 0.1s;}
  button.primary:hover{opacity:0.85;}button.primary:active{transform:scale(0.99);}
  button.primary:disabled{opacity:0.4;cursor:not-allowed;}
  .verdict-banner{border-radius:8px;padding:28px;text-align:center;margin-top:16px;border:1px solid;position:relative;overflow:hidden;}
  .verdict-banner::before{content:'';position:absolute;inset:0;opacity:0.06;background:currentColor;}
  .verdict-banner.TRUE{border-color:var(--green);color:var(--green);}
  .verdict-banner.FALSE{border-color:var(--red);color:var(--red);}
  .verdict-banner.UNVERIFIABLE{border-color:var(--yellow);color:var(--yellow);}
  .verdict-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;opacity:0.7;margin-bottom:8px;}
  .verdict-text{font-family:var(--font-sans);font-size:40px;font-weight:700;}
  .verdict-meta{margin-top:10px;font-size:11px;opacity:0.6;letter-spacing:0.05em;}
  .step-list{margin-top:16px;}
  .step{font-size:12px;padding:4px 0;opacity:0;animation:fi 0.3s forwards;color:var(--muted);}
  .step.ok{color:var(--green);}
  .step.run{color:var(--accent);}
  @keyframes fi{to{opacity:1;}}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);
    border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .msg{font-size:12px;color:var(--muted);padding:8px 0;}
  .msg.err{color:var(--red);}
</style>
</head>
<body>

<div class="wrap">
  <div class="logo">⬡ GenLayer · Intelligent Contract</div>
  <h1>Decentralized<br/><span>Fact Checker</span></h1>
  <p class="subtitle">
    Утверждение уходит на проверку сети валидаторов GenLayer.<br/>
    Каждый валидатор независимо спрашивает свою модель и голосует за консенсусный вердикт.
  </p>

  <div class="card">
    <textarea id="claimInput" placeholder="Введи утверждение для проверки..." rows="2"></textarea>
    <button class="primary" id="checkBtn" onclick="runCheck()">▶ Спросить валидаторов</button>
  </div>

  <div id="checkStatus"></div>
  <div id="checkResults"></div>
</div>

<script type="module">
import { createClient, createAccount, chains } from 'genlayer-js';
import { TransactionStatus } from 'genlayer-js/types';

// Технические детали контракта скрыты от интерфейса намеренно —
// это демо про идею (запрос → консенсус валидаторов → ответ),
// а не про управление кошельками.
const CONTRACT = '0xf533C8a8ff05f29d75cf9a1c894106E6103bfd69';
let client = createClient({ chain: chains.studionet, account: createAccount() });

window.runCheck = async function() {
  const claim = document.getElementById('claimInput').value.trim();
  if (!claim) return;
  const btn     = document.getElementById('checkBtn');
  const status  = document.getElementById('checkStatus');
  const results = document.getElementById('checkResults');
  btn.disabled = true;
  results.innerHTML = '';
  status.innerHTML = `<div class="card" style="text-align:center">
    <span class="spinner"></span><span style="font-size:12px;color:var(--muted)">Отправляем запрос сети...</span>
    <div class="step-list" id="steps"></div></div>`;
  try {
    step('Запрос отправлен валидаторам...', 'run');
    const txHash = await client.writeContract({
      address: CONTRACT, functionName: 'check_claim', args: [claim], value: BigInt(0),
    });
    step('Ждём консенсуса валидаторов...', 'run');
    await client.waitForTransactionReceipt({
      hash: txHash, status: TransactionStatus.ACCEPTED, interval: 3000, retries: 60,
    });
    step('Консенсус достигнут ✓', 'ok');
    const count   = await client.readContract({ address: CONTRACT, functionName: 'get_count', args: [] });
    const claimId = String(Number(count) - 1);
    const raw     = await client.readContract({ address: CONTRACT, functionName: 'get_verdict', args: [claimId] });
    let verdict = 'UNVERIFIABLE';
    if (raw && raw !== 'NOT_FOUND') {
      const v = (raw.includes('||') ? raw.split('||')[1] : raw).trim().toUpperCase();
      if (['TRUE','FALSE','UNVERIFIABLE'].includes(v)) verdict = v;
    }
    status.innerHTML = '';
    results.innerHTML = `
      <div class="verdict-banner ${verdict}">
        <div class="verdict-label">Вердикт валидаторов</div>
        <div class="verdict-text">${verdict}</div>
        <div class="verdict-meta">реальный ончейн-консенсус GenLayer</div>
      </div>`;
    results.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch(e) {
    status.innerHTML = '';
    results.innerHTML = `<div class="msg err">Ошибка: ${esc(e.message)}</div>`;
    console.error(e);
  }
  btn.disabled = false;
};

function step(text, cls) {
  const el = document.getElementById('steps');
  if (!el) return;
  el.querySelectorAll('.step.run').forEach(s => { s.className = 'step ok'; s.textContent = '✓ ' + s.textContent.replace(/^→ /,''); });
  const s = document.createElement('div');
  s.className = `step ${cls}`;
  s.textContent = (cls === 'ok' ? '✓ ' : '→ ') + text;
  el.appendChild(s);
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('claimInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runCheck(); }
  });
});
</script>
</body>
</html>
